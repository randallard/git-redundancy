name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast gates — run on every push/PR (ADR-0011). Seconds; the primary feedback loop.
  gates:
    name: fast gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all
      - name: cargo-deny (licenses, bans, sources, advisories)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Proofs — separate job, every push/PR (ADR-0011). The Kani bundle + nightly are
  # cached on ~/.kani, so a warm run is just solve time (our harnesses are tiny).
  proofs:
    name: kani proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cache Kani toolchain
        uses: actions/cache@v4
        with:
          path: ~/.kani
          key: kani-0.67.0-${{ runner.os }}
      - name: run Kani on the core classifiers
        uses: model-checking/kani-github-action@v1
        with:
          kani-version: '0.67.0'
          args: '-p git-redundancy-core'
