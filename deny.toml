# cargo-deny config (ADR-0004 supply-chain gate). Run: `cargo deny check`.

[advisories]
version = 2
yanked = "deny"
# Known vulnerabilities are denied by default under version = 2.
ignore = [
    # proc-macro-error: unmaintained (not a vulnerability). Build-time-only, pulled in
    # transitively by tabled_derive -> tabled; no upstream release avoids it yet. Revisit
    # on a tabled upgrade (or swap the table crate) to drop this ignore.
    "RUSTSEC-2024-0370",
]

[licenses]
version = 2
confidence-threshold = 0.8
# Permissive licenses only — keep the dependency tree clean (ADR-0010 leans on this).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
