# Example: ~/.ssh/config.d/tenx.conf  (requires `Include config.d/*.conf` in ~/.ssh/config)
#
# git-redundancy transport to the bare-repo host (ADR-0009 / ADR-0005 Path A).
# FIPS-approved KEX / cipher / MAC, fail-closed; host identity pinned via HostKeyAlias
# (one pinned key serves both the LAN and Tailscale paths). In the git remotes,
# data-lan -> tenx-lan, data -> tenx-ts.
#
# No secrets here: just algorithms, hostnames, and a username. The host-key *pin* lives
# in ~/.ssh/known_hosts (see docs/SETUP.md), not in this file.
#
# NOTE: if your client auth key is ed25519 (FIPS 186-5), leave PubkeyAcceptedAlgorithms at
# its default so that key still works. For full traditional-FIPS alignment, add an
# ecdsa/rsa client key and then restrict PubkeyAcceptedAlgorithms to match.

Host tenx-lan
    HostName tenx-rltec.local
    User randallard
    HostKeyAlias tenx-rltec
    StrictHostKeyChecking yes
    KexAlgorithms ecdh-sha2-nistp256,ecdh-sha2-nistp384,ecdh-sha2-nistp521
    Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr
    MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
    HostKeyAlgorithms ecdsa-sha2-nistp256,ecdsa-sha2-nistp384,ecdsa-sha2-nistp521,rsa-sha2-512,rsa-sha2-256

Host tenx-ts
    HostName tenx-rltec
    User randallard
    HostKeyAlias tenx-rltec
    StrictHostKeyChecking yes
    KexAlgorithms ecdh-sha2-nistp256,ecdh-sha2-nistp384,ecdh-sha2-nistp521
    Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr
    MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
    HostKeyAlgorithms ecdsa-sha2-nistp256,ecdsa-sha2-nistp384,ecdsa-sha2-nistp521,rsa-sha2-512,rsa-sha2-256
